    "corpcor": {
      "Package": "corpcor",
      "Version": "1.6.10",
      "Source": "Repository",
      "Date": "2021-09-16",
      "Title": "Efficient Estimation of Covariance and (Partial) Correlation",
      "Author": "Juliane Schafer, Rainer Opgen-Rhein, Verena Zuber, Miika Ahdesmaki,  A. Pedro Duarte Silva, and Korbinian Strimmer.",
